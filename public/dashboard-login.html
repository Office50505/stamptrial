<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in · StampMyMark</title>
<style>
:root{--bg:#f4f5f7;--surface:#fff;--border:#e2e5e9;--text:#17191c;--muted:#68707b;--accent:#17191c;--error:#b42318;--error-bg:#fef3f2}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0,#fff 0,#f7f7f8 32%,var(--bg) 72%);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;display:grid;place-items:center;padding:20px}.shell{width:min(420px,100%)}.brand{text-align:center;margin-bottom:20px}.stamp-wrap{width:126px;height:88px;margin:0 auto 12px;display:grid;place-items:center}.stamp{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 5px 12px #1112)}h1{font-size:22px;margin:0 0 5px}.subtitle{color:var(--muted);font-size:13px}.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:0 16px 45px #1111}.field{display:grid;gap:7px;margin-bottom:15px}label{font-size:12px;font-weight:750}input{width:100%;height:44px;border:1px solid var(--border);border-radius:9px;padding:0 12px;font:inherit;color:var(--text);background:#fff}input:focus{outline:3px solid #dbe8ff;border-color:#175cd3}.password-wrap{position:relative}.password-wrap input{padding-right:68px}.show{position:absolute;right:5px;top:5px;height:34px;border:0;background:transparent;color:var(--muted);font-weight:700;cursor:pointer}.submit{width:100%;height:44px;border:1px solid var(--accent);border-radius:9px;background:var(--accent);color:#fff;font:inherit;font-weight:750;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px}.submit:disabled{opacity:.65;cursor:wait}.spinner{width:18px;height:18px;object-fit:contain;display:none;animation:spin .8s linear infinite}.loading .spinner{display:block}.error{display:none;margin-bottom:14px;padding:10px 11px;border-radius:8px;background:var(--error-bg);color:var(--error);font-size:12px}.error.show-error{display:block}.security{text-align:center;color:var(--muted);font-size:11px;margin-top:14px}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:480px){.card{padding:20px}.stamp-wrap{width:105px;height:73px}}
</style></head><body><main class="shell"><div class="brand"><div class="stamp-wrap"><img class="stamp" src="/stamp.webp" alt="StampMyMark"></div><h1>Welcome back</h1><div class="subtitle">Sign in to the production queue</div></div><form id="login" class="card"><div id="error" class="error" role="alert"></div><div class="field"><label for="username">Username</label><input id="username" name="username" autocomplete="username" required autofocus></div><div class="field"><label for="password">Password</label><div class="password-wrap"><input id="password" name="password" type="password" autocomplete="current-password" required><button id="show" class="show" type="button">Show</button></div></div><button id="submit" class="submit" type="submit"><img class="spinner" src="/stamp.webp" alt=""><span>Sign in</span></button></form><div class="security">Protected StampMyMark workspace</div></main>
<script>
const form=document.getElementById("login"),submit=document.getElementById("submit"),error=document.getElementById("error"),password=document.getElementById("password"),show=document.getElementById("show");
show.onclick=()=>{const visible=password.type==="text";password.type=visible?"password":"text";show.textContent=visible?"Show":"Hide"};
form.onsubmit=async e=>{e.preventDefault();error.classList.remove("show-error");submit.disabled=true;submit.classList.add("loading");try{const response=await fetch("/api/dashboard-login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("username").value,password:password.value})});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||"Could not sign in.");window.location.replace("/dashboard.html")}catch(e){error.textContent=e.message;error.classList.add("show-error");password.focus();password.select()}finally{submit.disabled=false;submit.classList.remove("loading")}};
</script></body></html>
