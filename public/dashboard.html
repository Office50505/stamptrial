<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>StampMyMark Production Queue</title>
<style>
:root{--bg:#f4f5f7;--surface:#fff;--soft:#f8f9fb;--border:#e2e5e9;--text:#17191c;--muted:#68707b;--accent:#17191c;--blue:#175cd3;--blue-bg:#eff6ff;--amber:#9a5b00;--amber-bg:#fff7e6;--green:#18794e;--green-bg:#eaf8f0;--gray-bg:#f0f2f4;--r:10px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select,a{font:inherit}.topbar{position:sticky;top:0;z-index:20;background:#fffffff2;border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}.topbar-inner{max-width:1480px;margin:auto;padding:11px 20px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:11px}.brand img{width:68px;height:44px;object-fit:contain}.brand h1{font-size:16px;margin:0}.eyebrow{font-size:12px;color:var(--muted)}button,.button{min-height:38px;padding:0 13px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-weight:650;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}.primary{background:var(--accent);border-color:var(--accent);color:#fff}.small{min-height:34px;padding:0 10px;font-size:12px}button:disabled{opacity:.55;cursor:not-allowed}main{max-width:1480px;margin:auto;padding:20px;display:grid;gap:14px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{border:1px solid var(--border);border-radius:var(--r);background:#fff;padding:14px;text-align:left;display:grid;gap:6px}.metric-label{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:800}.metric-value{font-size:25px;font-weight:780}.filters{position:sticky;top:67px;z-index:15;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px;display:grid;grid-template-columns:minmax(260px,1fr) repeat(4,minmax(125px,auto)) auto;gap:8px}.control{min-height:40px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:0 11px;min-width:0}.control:focus{outline:2px solid #b9d2ff;border-color:var(--blue)}.summary{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px}.summary strong{color:var(--text)}.queue{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}.queue-head,.queue-row{display:grid;grid-template-columns:minmax(145px,1.05fr) 140px minmax(150px,1fr) 90px minmax(210px,1.5fr) 115px 190px;gap:12px;align-items:center}.queue-head{padding:10px 14px;background:var(--soft);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:800}.queue-row{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}.queue-row:hover{background:#fafbfc}.order-name{font-weight:750;font-size:14px}.design-id,.subtle{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.customer{font-size:13px;font-weight:650}.design-copy{font-size:13px}.note{display:inline-flex;margin-top:4px;color:var(--amber);background:var(--amber-bg);padding:2px 6px;border-radius:5px;font-size:10px;font-weight:750}.actions{display:flex;gap:6px;justify-content:flex-end}.badge{padding:5px 8px;border-radius:999px;font-size:11px;font-weight:780;white-space:nowrap}.awaiting_order{background:var(--gray-bg);color:#59616b}.new_order{background:var(--amber-bg);color:var(--amber)}.in_production{background:var(--blue-bg);color:var(--blue)}.ready,.completed{background:var(--green-bg);color:var(--green)}.state{padding:38px;text-align:center;color:var(--muted)}.state-title{font-size:16px;font-weight:750;color:var(--text);margin-bottom:6px}.live-banner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border:1px solid #bfd4ff;border-radius:9px;background:var(--blue-bg);color:var(--blue);font-size:13px;font-weight:700}.live-banner[hidden]{display:none}.live-banner button{min-height:32px;color:#fff;background:var(--blue);border-color:var(--blue)}.load-more{text-align:center;padding:14px;color:var(--muted);font-size:12px}.skeleton{height:68px;background:linear-gradient(90deg,#f1f2f4,#fafafa,#f1f2f4);background-size:200%;animation:pulse 1.2s infinite}@keyframes pulse{to{background-position:-200%}}.backdrop{position:fixed;inset:0;background:#11182766;z-index:40;opacity:0;pointer-events:none;transition:.18s}.backdrop.open{opacity:1;pointer-events:auto}.drawer{position:fixed;right:0;top:0;bottom:0;width:min(560px,100%);background:#fff;z-index:41;transform:translateX(100%);transition:.2s;box-shadow:-12px 0 40px #0002;display:grid;grid-template-rows:auto 1fr}.drawer.open{transform:none}.drawer-head{padding:17px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}.drawer-title{font-size:18px;font-weight:780}.drawer-head-actions{display:flex;gap:6px;align-items:center}.icon{width:38px;padding:0;font-size:20px}.copy-line{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}.copy-value{min-width:0;overflow-wrap:anywhere}.copy-btn{min-height:26px;padding:0 7px;font-size:10px;flex:0 0 auto;color:var(--blue);background:var(--blue-bg);border-color:#cfe0ff}.drawer-body{overflow:auto;padding:18px;display:grid;align-content:start;gap:14px}.block{border:1px solid var(--border);border-radius:9px;padding:13px}.block-title{font-size:10px;text-transform:uppercase;font-weight:800;color:var(--muted);margin-bottom:10px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.detail{font-size:13px;overflow-wrap:anywhere}.detail strong{display:block;font-size:10px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}.wide{grid-column:1/-1}.notes{background:var(--amber-bg)}.drawer-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.status-control{display:flex;gap:8px}.status-control select{flex:1}.toast{position:fixed;right:18px;bottom:18px;z-index:60;background:#17191c;color:#fff;padding:11px 14px;border-radius:8px;opacity:0;transition:.18s}.toast.show{opacity:1}
.mobile-customer{display:none}.load-stamp{width:56px;height:38px;object-fit:contain;display:block;margin:0 auto;animation:stamp-spin .85s linear infinite}@keyframes stamp-spin{to{transform:rotate(360deg)}}@media(max-width:1050px){.filters{grid-template-columns:1fr 1fr 1fr}.search{grid-column:1/-1}.queue-head{display:none}.queue-row{grid-template-columns:1fr 140px 170px}.queue-row>div:nth-child(3),.queue-row>div:nth-child(4),.queue-row>div:nth-child(5){display:none}.actions{grid-column:3}}@media(max-width:680px){.topbar-inner,main{padding-left:12px;padding-right:12px}.brand img{width:52px;height:36px}.metrics{grid-template-columns:1fr 1fr}.filters{top:59px;grid-template-columns:1fr 1fr}.search{grid-column:1/-1}.filters button{grid-column:1/-1}.queue{margin-inline:-12px;border-left:0;border-right:0;border-radius:0}.queue-row{grid-template-columns:1fr auto}.queue-row>div{display:block!important}.queue-row>div:nth-child(3),.queue-row>div:nth-child(4){display:none!important}.queue-row>div:nth-child(5){grid-column:1/-1}.queue-row .design-id{display:none!important}.queue-row .mobile-customer{display:block!important}.actions{grid-column:2}.summary{flex-direction:column}.detail-grid,.drawer-actions{grid-template-columns:1fr}.drawer-head{padding:13px 12px}.drawer-body{padding:12px 12px 96px}.status-control .control,.status-control button,.drawer-actions .button,.drawer-actions button{min-height:48px}.file-block{position:sticky;bottom:-1px;background:#fff;box-shadow:0 -10px 24px #1112;z-index:3}.copy-btn{min-height:32px;padding:0 10px}}
/* Premium dashboard refinements */
:root{--red:#b42318;--red-bg:#fff1f0}main{gap:16px}.metric{padding:18px;gap:8px;position:relative;overflow:hidden;box-shadow:0 2px 8px #1018280a}.metric:before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:#cbd5e1}.metric[data-status="needs_attention"]{background:linear-gradient(135deg,#fff 55%,var(--red-bg));border-color:#ffd2cc}.metric[data-status="needs_attention"]:before{background:var(--red)}.metric[data-status="ready"]:before{background:var(--green)}.metric[data-status="ordered"]:before{background:var(--blue)}.filters{padding:12px;background:#ffffffed;backdrop-filter:blur(10px);box-shadow:0 8px 24px #1018280b;grid-template-columns:minmax(320px,1.35fr) repeat(4,minmax(125px,auto)) auto}.search{border-color:#aebdce;font-weight:560;box-shadow:0 1px 3px #10182810}.secondary{background:transparent;border-color:#aeb8c2}.queue-row{padding-top:17px;padding-bottom:17px;transition:background .15s,box-shadow .15s}.queue-row:hover{background:#f7faff;box-shadow:inset 3px 0 var(--blue)}.queue-row.attention{background:#fffafa}.queue-row.attention:hover{background:#fff5f3;box-shadow:inset 3px 0 var(--red)}.badge{display:inline-flex;align-items:center;gap:6px}.badge:before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}.needs_attention{background:var(--red-bg);color:var(--red)}.note-wrap{margin-top:6px}.note-text{color:#7a4b00;font-size:11px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.note-text.expanded{-webkit-line-clamp:unset}.note-toggle{min-height:0;padding:2px 0;border:0;background:none;color:var(--blue);font-size:11px}.action-icon{font-size:14px}.sync-status{font-size:11px;color:var(--muted);text-align:right}.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px}.preview{min-height:240px;border-radius:10px;background:var(--soft);display:grid;place-items:center;overflow:hidden}.preview img{width:100%;max-height:3 }/* Professional filter toolbar and encoding-safe SVG icons */
.filters{grid-template-columns:minmax(300px,1.5fr) repeat(4,minmax(130px,1fr));padding:14px;gap:12px;align-items:end}.filter-heading{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:16px;padding-bottom:11px;border-bottom:1px solid var(--border)}.filter-heading>div{display:grid;gap:2px}.filter-heading strong{font-size:14px}.filter-heading span{font-size:11px;color:var(--muted)}.filter-field{display:grid;gap:6px;min-width:0}.filter-label{padding-left:2px;font-size:10px;line-height:1;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:800}.search-field{min-width:0}.search-control{position:relative;display:block}.search-control>svg{position:absolute;z-index:1;left:12px;top:50%;width:17px;height:17px;transform:translateY(-50%);fill:none;stroke:var(--muted);stroke-width:2;pointer-events:none}.search-control .search{width:100%;padding-left:38px;border-color:#9eb2cb;box-shadow:0 0 0 3px #175cd30a}.control:hover{border-color:#aab4c0}.button-icon,.icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.icon svg{width:19px;height:19px}.action-icon{display:none}
@media(max-width:1050px){.filters{grid-template-columns:repeat(2,minmax(0,1fr))}.filter-heading,.search-field{grid-column:1/-1}}
@media(max-width:680px){.filters{grid-template-columns:repeat(2,minmax(0,1fr));align-items:stretch}.filter-heading{align-items:flex-start}.filter-heading span{display:none}.filter-heading button{grid-column:auto;width:auto}.search-field{grid-column:1/-1}.filter-field .control{width:100%}}
@media(max-width:420px){.filters{grid-template-columns:1fr}.filter-heading,.search-field{grid-column:1}.filter-heading{gap:8px}.filter-heading strong{font-size:13px}.filter-heading button{padding-inline:8px}.button-icon{width:15px;height:15px}}</style></head><body>
<header class="topbar"><div class="topbar-inner"><div class="brand"><img src="/stamp.webp" alt=""><div><h1>StampMyMark Studio</h1><div class="eyebrow">Production queue</div></div></div><div><div style="display:flex;gap:8px"><button id="logout" class="secondary">Logout</button><button id="refresh" class="primary"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7"></path><path d="M20 4v7h-7"></path></svg>Refresh</button></div><div class="sync-status"><span class="sync-dot"></span>Live updates on</div></div></div></header>
<main><section id="metrics" class="metrics"></section><section class="filters" aria-label="Queue filters"><div class="filter-heading"><div><strong>Find an order</strong><span>Search and narrow the production queue</span></div><button id="clear" class="secondary small" type="button">Clear filters</button></div><label class="filter-field search-field"><span class="filter-label">Search</span><span class="search-control"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-4-4"></path></svg><input id="search" class="control search" type="search" placeholder="Order, customer, design ID or text"></span></label><label class="filter-field"><span class="filter-label">Status</span><select id="status" class="control"><option value="all">All statuses</option><option value="needs_attention">Needs attention</option><option value="new_order">New order</option><option value="in_production">In production</option><option value="ready">Ready</option><option value="completed">Completed</option><option value="awaiting_order">Awaiting order</option></select></label><label class="filter-field"><span class="filter-label">Stamp size</span><select id="size" class="control"><option value="">All sizes</option><option value="s">S - 3 in</option><option value="m">M - 4 in</option><option value="l">L - 6 in</option><option value="xl">XL - 8 in</option><option value="xxl">XXL - 10 in</option></select></label><label class="filter-field"><span class="filter-label">Artwork</span><select id="final" class="control"><option value="">Any artwork</option><option value="yes">Final ready</option><option value="no">Final missing</option></select></label><label class="filter-field"><span class="filter-label">Saved</span><select id="days" class="control"><option value="">Any date</option><option value="1">Last 24 hours</option><option value="7">Last 7 days</option><option value="30">Last 30 days</option><option value="90">Last 90 days</option></select></label></section><div id="live-banner" class="live-banner" hidden><span id="live-text">New updates are available</span><button id="show-updates" class="small">Show updates</button></div><div class="summary"><span id="summary">Loading queue...</span><span>Ready designs first, then latest saved.</span></div><section class="queue"><div class="queue-head"><div>Order</div><div>Status</div><div>Customer</div><div>Size</div><div>Design content</div><div>Saved</div><div>Actions</div></div><div id="rows"></div><div id="more" class="load-more" hidden></div></section></main>
<div id="backdrop" class="backdrop"></div><aside id="drawer" class="drawer" aria-hidden="true"><div class="drawer-head"><div><div id="drawer-title" class="drawer-title"></div><div id="drawer-id" class="design-id"></div></div><div class="drawer-head-actions"><button id="prev" class="icon" title="Previous order" aria-label="Previous order"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg></button><button id="next" class="icon" title="Next order" aria-label="Next order"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"></path></svg></button><button id="close" class="icon" title="Close" aria-label="Close"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"></path></svg></button></div></div><div id="drawer-body" class="drawer-body"></div></aside><div id="toast" class="toast"></div>
<script>
const sizes={s:"S - 3 in",m:"M - 4 in",l:"L - 6 in",xl:"XL - 8 in",xxl:"XXL - 10 in"},labels={awaiting_order:"Awaiting",needs_attention:"Attention",new_order:"New",in_production:"Production",ready:"Ready",completed:"Complete"};
let designs=[],cursor=null,loading=false,metrics=null,total=null,selected=null,timer,pendingUpdates=0;
const $=id=>document.getElementById(id),esc=v=>String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const ordered=d=>Boolean(d.hasOrder||d.orderName||d.orderNumber||d.orderId);
function state(d){if(!ordered(d))return"awaiting_order";if(d.workflowStatus&&d.workflowStatus!=="new_order")return d.workflowStatus;return d.finalDesignUrl?"ready":"needs_attention"}
function relative(v){if(!v)return"Unknown";const d=new Date(v),s=(Date.now()-d)/1000;if(s<60)return"Just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";if(s<172800)return"Yesterday";if(s<604800)return Math.floor(s/86400)+"d ago";return d.toLocaleDateString()}
function exact(v){const d=new Date(v);return v&&!isNaN(d)?d.toLocaleString():"-"}
function params(){const p=new URLSearchParams(),map={q:$("search").value.trim(),status:$("status").value,size:$("size").value,final:$("final").value,days:$("days").value};for(const[k,v]of Object.entries(map))if(v&&!(k==="status"&&v==="all"))p.set(k,v);return p}
function notify(m){$("toast").textContent=m;$("toast").classList.add("show");clearTimeout($("toast").t);$("toast").t=setTimeout(()=>$("toast").classList.remove("show"),2200)}
function renderMetrics(){const m=metrics||{ordered:0,finalReady:0,total:0};$("metrics").innerHTML=[["Ordered",m.ordered,"ordered"],["Needs attention",m.needsAttention??0,"needs_attention"],["Final ready",m.finalReady,"ready"],["Total saved",m.total,"all"]].map(x=>`<button class="metric" data-status="${x[2]}"><span class="metric-label">${x[0]}</span><span class="metric-value">${x[1]}</span></button>`).join("")}
function row(d){const s=d.settings||{},st=state(d),order=d.orderName||(d.orderNumber?`#${d.orderNumber}`:"Awaiting order"),customer=d.customerName||d.customerEmail||"No customer",copy=[s.aboveText,s.belowText].filter(Boolean).join(" / ")||"No text saved",primary=d.finalDesignUrl?`<button class="primary small" data-download="${esc(d.designId)}"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"></path></svg>Download</button>`:"";return `<article class="queue-row ${st==="needs_attention"?"attention":""}" tabindex="0" data-id="${esc(d.designId)}"><div><div class="order-name">${esc(order)}</div><div class="design-id">${esc(d.designId)}</div><div class="subtle mobile-customer">${esc(customer)}</div></div><div><span class="badge ${st}">${labels[st]}</span></div><div><div class="customer">${esc(customer)}</div><div class="subtle">${esc(d.customerEmail||"")}</div></div><div>${esc(sizes[String(s.selectedSize||"").toLowerCase()]||String(s.selectedSize||"-").toUpperCase())}</div><div class="design-copy">${esc(copy)}${s.notesForDesigner?`<div class="note-wrap"><div class="note-text" title="${esc(s.notesForDesigner)}">${esc(s.notesForDesigner)}</div></div>`:""}</div><div title="${esc(exact(d.createdAt))}">${esc(relative(d.createdAt))}</div><div class="actions">${primary}<button class="small" data-view="${esc(d.designId)}"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>View</button></div></article>`}
function render(){if(!designs.length)$("rows").innerHTML='<div class="state"><div class="state-title">No designs found</div><div>Try clearing filters or changing your search.</div></div>';else $("rows").innerHTML=designs.map(row).join("");summary()}
function summary(){$("summary").innerHTML=total==null?`<strong>${designs.length}</strong> designs loaded`:`Showing <strong>${designs.length}</strong> of <strong>${total}</strong> matching designs`}
async function loadMetrics(){try{const r=await fetch("/api/design-metrics"),d=await r.json();if(r.ok){metrics=d.metrics;renderMetrics()}}catch{}}
async function count(p){try{const r=await fetch("/api/design-count?"+p),d=await r.json();if(r.ok){total=d.count;summary()}}catch{}}
async function load({reset=false}={}){if(loading||(!reset&&!cursor&&designs.length))return;loading=true;$("refresh").disabled=true;$("more").hidden=false;$("more").innerHTML='<img class="load-stamp" src="/stamp.webp" alt="Loading"><div>Loading more...</div>';if(reset){designs=[];cursor=null;total=null;$("rows").innerHTML='<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';$("summary").textContent="Loading queue..."}const p=params();p.set("limit","15");if(!reset&&cursor)p.set("cursor",cursor);const controller=new AbortController(),timeout=setTimeout(()=>controller.abort(),12000);try{const r=await fetch("/api/designs?"+p,{signal:controller.signal}),d=await r.json();if(!r.ok)throw Error(d.error||"Could not load designs");designs=reset?d.designs:[...designs,...d.designs];cursor=d.nextCursor||null;render();if(reset){loadMetrics();count(params())}$("more").hidden=false;$("more").innerHTML=cursor?'<button id="load-more" class="small">Load more</button><div class="subtle">Scroll also loads more automatically.</div>':'All matching designs loaded'}catch(e){const message=e.name==="AbortError"?"The server took longer than 12 seconds. Please retry.":e.message;if(!designs.length)$("rows").innerHTML=`<div class="state"><div class="state-title">Could not load designs</div><div>${esc(message)}</div></div>`;$("more").innerHTML='Load failed. <button id="retry" class="small">Retry</button>'}finally{clearTimeout(timeout);loading=false;$("refresh").disabled=false}}
const detail=(k,v,w="",copy=false)=>`<div class="detail ${w}"><strong>${esc(k)}</strong><div class="copy-line"><span class="copy-value">${esc(v||"-")}</span>${copy&&v?`<button class="copy-btn" data-copy="${esc(v)}">Copy</button>`:""}</div></div>`;
function open(id){const d=designs.find(x=>x.designId===id);if(!d)return;selected=id;const selectedIndex=designs.findIndex(x=>x.designId===id);$("prev").disabled=selectedIndex<=0;$("next").disabled=selectedIndex<0||selectedIndex>=designs.length-1;const s=d.settings||{},st=state(d),opts=Object.entries(labels).filter(x=>!["awaiting_order","needs_attention"].includes(x[0])).map(x=>`<option value="${x[0]}" ${st===x[0]?"selected":""}>${x[1]}</option>`).join("");$("drawer-title").textContent=d.orderName||"Design details";$("drawer-id").innerHTML=`<div class="copy-line"><span class="copy-value">${esc(id)}</span><button class="copy-btn" data-copy="${esc(id)}">Copy ID</button></div>`;$("drawer-body").innerHTML=`${(d.finalDesignUrl||d.chosenVariantUrl||d.originalImageUrl)?`<section class="preview"><img src="${esc(d.finalDesignUrl||d.chosenVariantUrl||d.originalImageUrl)}" alt="Design preview"></section>`:""}<section class="block"><div class="block-title">Workflow</div><div class="status-control"><select id="workflow" class="control" ${!ordered(d)?"disabled":""}>${opts}</select><button id="save" class="primary" ${!ordered(d)?"disabled":""}>Save</button></div></section><section class="block"><div class="block-title">Design content</div><div class="detail-grid">${detail("Above text",s.aboveText,"",true)}${detail("Below text",s.belowText,"",true)}${detail("Size",sizes[s.selectedSize]||s.selectedSize)}${detail("Ink color",s.inkColor)}${s.notesForDesigner?detail("Designer notes",s.notesForDesigner,"wide"):""}</div></section><section class="block ${s.notesForDesigner?"notes":""}"><div class="block-title">Order and customer</div><div class="detail-grid">${detail("Order",d.orderName||d.orderNumber,"",true)}${detail("Order date",exact(d.orderCreatedAt))}${detail("Customer",d.customerName,"wide",true)}${detail("Email",d.customerEmail,"wide",true)}${detail("Saved",exact(d.createdAt),"wide")}</div></section><section class="block file-block"><div class="block-title">Files</div><div class="drawer-actions">${d.finalDesignUrl?`<a class="button primary" target="_blank" href="${esc(d.finalDesignUrl)}">Open final</a>`:"<button disabled>Final unavailable</button>"}${d.originalImageUrl?`<a class="button" target="_blank" href="${esc(d.originalImageUrl)}">Open original</a>`:"<button disabled>Original unavailable</button>"}</div></section>`;$("drawer").classList.add("open");$("backdrop").classList.add("open")}
function navigateDrawer(delta){const index=designs.findIndex(x=>x.designId===selected),next=index+delta;if(next>=0&&next<designs.length)open(designs[next].designId)}function copyText(value){if(!value)return;const fallback=()=>{const area=document.createElement("textarea");area.value=value;area.style.position="fixed";area.style.opacity="0";document.body.appendChild(area);area.select();document.execCommand("copy");area.remove()};if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(value).catch(fallback);else fallback();notify("Copied to clipboard")}function close(){$("drawer").classList.remove("open");$("backdrop").classList.remove("open");selected=null}
async function save(){const d=designs.find(x=>x.designId===selected),value=$("workflow").value;try{const r=await fetch(`/api/designs/${encodeURIComponent(selected)}/status`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({workflowStatus:value})}),data=await r.json();if(!r.ok)throw Error(data.error);d.workflowStatus=value;render();open(selected);notify("Workflow updated")}catch(e){notify(e.message)}}
async function download(id){const d=designs.find(x=>x.designId===id);if(!d?.finalDesignUrl)return;try{const r=await fetch(d.finalDesignUrl),blob=await r.blob(),u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download=id+"-final.png";a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}catch{window.open(d.finalDesignUrl,"_blank")}}
function connectLiveUpdates(){let failures=0;const source=new EventSource("/api/dashboard-events");const showUpdate=update=>{loadMetrics();if(update.type==="status_changed"&&update.designId===selected)return;pendingUpdates++;$("live-text").textContent=pendingUpdates===1?"1 new update is available":pendingUpdates+" new updates are available";$("live-banner").hidden=false};source.onopen=()=>{failures=0};source.addEventListener("dashboard-update",event=>{let update={};try{update=JSON.parse(event.data)}catch{}showUpdate(update)});source.onerror=()=>{failures++;if(failures>=3){source.close();console.warn("Live stream unavailable; using periodic refresh checks.");setInterval(loadMetrics,30000)}}}
function applyLiveUpdates(){pendingUpdates=0;$("live-banner").hidden=true;loadMetrics();reset()}function reset(){cursor=null;load({reset:true})}
$("show-updates").onclick=applyLiveUpdates;$("logout").onclick=async()=>{await fetch("/api/dashboard-logout",{method:"POST"});window.location.replace("/dashboard-login.html")};$("refresh").onclick=reset;["status","size","final","days"].forEach(id=>$(id).onchange=reset);$("search").oninput=()=>{clearTimeout(timer);timer=setTimeout(reset,280)};$("clear").onclick=()=>{$("search").value="";$("status").value="all";$("size").value="";$("final").value="";$("days").value="";reset()};$("metrics").onclick=e=>{const x=e.target.closest("[data-status]");if(x){$("status").value=x.dataset.status;reset()}};$("rows").onclick=e=>{const dl=e.target.closest("[data-download]"),v=e.target.closest("[data-view]"),r=e.target.closest("[data-id]");if(dl){e.stopPropagation();download(dl.dataset.download)}else open(v?.dataset.view||r?.dataset.id)};$("drawer").onclick=e=>{const copy=e.target.closest("[data-copy]");if(copy)copyText(copy.dataset.copy);if(e.target.id==="save")save()};$("prev").onclick=()=>navigateDrawer(-1);$("next").onclick=()=>navigateDrawer(1);$("close").onclick=close;$("backdrop").onclick=close;$("more").onclick=e=>{if(e.target.id==="retry"||e.target.id==="load-more")load()};document.onkeydown=e=>{if(e.key==="Escape")close()};new IntersectionObserver(x=>{if(x.some(y=>y.isIntersecting)&&cursor&&!loading)load()},{rootMargin:"500px"}).observe($("more"));renderMetrics();load({reset:true});connectLiveUpdates();
</script></body></html>
