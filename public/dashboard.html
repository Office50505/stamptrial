<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Line Art Design Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f6f7;
      --surface: #ffffff;
      --surface-muted: #f9fafb;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --muted-light: #9ca3af;
      --accent: #111827;
      --accent-hover: #1f2937;
      --success-bg: #ecfdf3;
      --success-text: #166534;
      --success-border: #bbf7d0;
      --warning-bg: #fffbeb;
      --warning-text: #92400e;
      --warning-border: #fde68a;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(246, 246, 247, 0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .header-inner {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .heading-block {
      display: grid;
      gap: 3px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    input, select, button, .download-btn, .open-link {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 14px;
    }

    input {
      width: min(320px, 70vw);
      padding: 0 12px;
    }

    select { padding: 0 10px; }

    button, .download-btn, .open-link {
      padding: 0 14px;
      cursor: pointer;
      font-weight: 650;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      line-height: 1;
    }

    button.primary, .download-btn {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    button.primary:hover, .download-btn:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .open-link, button.secondary {
      background: #ffffff;
      color: var(--text);
    }

    .open-link:hover, button.secondary:hover {
      background: var(--surface-muted);
      border-color: var(--border-strong);
    }

    button:disabled {
      cursor: not-allowed;
      background: #f3f4f6;
      border-color: var(--border);
      color: var(--muted-light);
    }

    main {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .summary {
      min-height: 44px;
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .summary strong {
      color: var(--text);
      font-weight: 700;
    }

    .summary-note {
      font-size: 13px;
      color: var(--muted);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .metric-card {
      min-width: 0;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.04);
    }

    .metric-label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric-value {
      color: var(--text);
      font-size: 26px;
      line-height: 1;
      font-weight: 760;
    }

    .category-tabs {
      margin-bottom: 14px;
      padding: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
      overflow-x: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .category-tab {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .category-tab:hover {
      background: var(--surface-muted);
      border-color: transparent;
    }

    .category-tab.active {
      background: var(--text);
      color: #ffffff;
      border-color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(360px, 42%) minmax(0, 1fr);
      grid-template-rows: auto 1fr;
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.04);
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.07);
    }

    .card-head {
      padding: 14px;
      display: grid;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      grid-column: 2;
      grid-row: 1;
    }

    .title-row {
      display: flex;
      gap: 10px;
      align-items: start;
      justify-content: space-between;
    }

    .order-heading {
      min-width: 0;
    }

    .design-id {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .order-title {
      margin-bottom: 4px;
      color: var(--text);
      font-size: 17px;
      font-weight: 760;
    }

    .badge {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid var(--border);
      color: #374151;
      font-size: 12px;
      font-weight: 750;
    }

    .badge.success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .badge.warning {
      background: var(--warning-bg);
      border-color: var(--warning-border);
      color: var(--warning-text);
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .meta-pill {
      min-height: 24px;
      padding: 4px 8px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--muted);
      font-weight: 650;
    }

    .images {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      background: var(--surface-muted);
      border-right: 1px solid var(--border);
      grid-column: 1;
      grid-row: 1 / span 2;
      align-content: start;
    }

    .image-cell {
      min-width: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .image-label {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 750;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      background: var(--surface-muted);
    }

    .image-wrap {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .image-cell.primary .image-wrap,
    .image-cell.compact .image-wrap {
      aspect-ratio: 1.08;
      background: #f9fafb;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .image-empty {
      padding: 12px;
      color: var(--muted-light);
      font-size: 12px;
      text-align: center;
    }

    .image-meta {
      min-height: 34px;
      padding: 9px 12px 0;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .image-actions {
      padding: 10px 12px 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .image-actions.has-open {
      grid-template-columns: 1fr 1fr;
    }

    .download-btn, .open-link {
      width: 100%;
      min-width: 0;
      padding: 0 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .settings {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      grid-column: 2;
      grid-row: 2;
      align-content: start;
    }

    .setting {
      min-width: 0;
      padding: 9px 10px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .setting.wide {
      grid-column: 1 / -1;
    }

    .setting strong {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .status {
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 760px) {
      .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { grid-template-columns: 1fr; grid-template-rows: auto; }
      .card-head, .images, .settings { grid-column: 1; grid-row: auto; }
      .images { border-right: 0; border-bottom: 1px solid var(--border); }
      .images { grid-template-columns: 1fr; }
      .settings { grid-template-columns: 1fr; }
      input { width: 100%; }
      .toolbar { width: 100%; }
      .toolbar input, .toolbar select, .toolbar button { flex: 1 1 100%; }
      .grid { grid-template-columns: 1fr; }
      .image-actions.has-open { grid-template-columns: 1fr; }
    }

    @media (min-width: 761px) and (max-width: 1180px) {
      .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { grid-template-columns: minmax(300px, 44%) minmax(0, 1fr); }
      .images { grid-template-columns: 1fr; }
      .settings { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="heading-block">
        <h1>Line Art Dashboard</h1>
        <div class="eyebrow">Review saved customer artwork and download production images.</div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search design id, text, size">
        <select id="limit">
          <option value="50">Latest 50</option>
          <option value="100" selected>Latest 100</option>
          <option value="200">Latest 200</option>
        </select>
        <button id="refresh" class="primary" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <div class="metrics-grid" id="metrics"></div>
    <div class="category-tabs" id="category-tabs" aria-label="Design categories"></div>
    <div class="summary" id="summary">Loading designs...</div>
    <div id="content" class="status">Loading...</div>
  </main>

  <script>
    const sizeLabels = {
      m: "M - 4 in",
      l: "L - 6 in",
      xl: "XL - 8 in",
      xxl: "XXL - 10 in"
    };

    let designs = [];
    let activeCategory = "ordered";

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatDate(value) {
      if (!value) return "Unknown date";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Unknown date";
      return date.toLocaleString();
    }

    function normalizeSize(size) {
      const key = String(size || "").toLowerCase();
      return sizeLabels[key] || String(size || "Not saved").toUpperCase();
    }

    function hasOrder(design) {
      return Boolean(design.orderName || design.orderNumber || design.orderId);
    }

    function hasFinalDesign(design) {
      return Boolean(design.finalDesignUrl);
    }

    function getMetrics() {
      return {
        total: designs.length,
        ordered: designs.filter(hasOrder).length,
        awaiting: designs.filter((design) => !hasOrder(design)).length,
        finalReady: designs.filter(hasFinalDesign).length
      };
    }

    function categoryMatches(design) {
      if (activeCategory === "ordered") return hasOrder(design);
      if (activeCategory === "awaiting") return !hasOrder(design);
      if (activeCategory === "final") return hasFinalDesign(design);
      return true;
    }

    function sortDesignsForDashboard(a, b) {
      const orderDelta = Number(hasOrder(b)) - Number(hasOrder(a));
      if (orderDelta) return orderDelta;

      const aTime = new Date(a.createdAt || 0).getTime() || 0;
      const bTime = new Date(b.createdAt || 0).getTime() || 0;
      return bTime - aTime;
    }

    function renderMetrics(metrics) {
      document.getElementById("metrics").innerHTML = `
        <div class="metric-card">
          <div class="metric-label">Ordered</div>
          <div class="metric-value">${metrics.ordered}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Awaiting order</div>
          <div class="metric-value">${metrics.awaiting}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Final ready</div>
          <div class="metric-value">${metrics.finalReady}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Total saved</div>
          <div class="metric-value">${metrics.total}</div>
        </div>
      `;
    }

    function renderCategoryTabs(metrics) {
      const tabs = [
        ["ordered", `Ordered (${metrics.ordered})`],
        ["awaiting", `Awaiting order (${metrics.awaiting})`],
        ["final", `Final ready (${metrics.finalReady})`],
        ["all", `All (${metrics.total})`]
      ];

      document.getElementById("category-tabs").innerHTML = tabs.map(([key, label]) => `
        <button class="category-tab${activeCategory === key ? " active" : ""}" type="button" data-category="${key}">
          ${escapeHtml(label)}
        </button>
      `).join("");
    }

    function filenameFrom(label, designId) {
      const safeId = String(designId || "line-art-design")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "line-art-design";
      const safeLabel = String(label || "image")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "image";
      return `${safeId}-${safeLabel}.png`;
    }

    function imageCell(label, url, designId, modifier = "") {
      const cellClass = `image-cell${modifier ? ` ${modifier}` : ""}`;
      if (!url) {
        return `
          <div class="${cellClass}">
            <div class="image-label">${label}</div>
            <div class="image-wrap"><div class="image-empty">Not saved</div></div>
            <div class="image-meta">-</div>
            <div class="image-actions">
              <button class="secondary" type="button" disabled>Unavailable</button>
            </div>
          </div>
        `;
      }

      const safeUrl = escapeHtml(url);
      const fileName = escapeHtml(filenameFrom(label, designId));
      return `
        <div class="${cellClass}">
          <div class="image-label">${label}</div>
          <a class="image-wrap" href="${safeUrl}" target="_blank" rel="noopener" aria-label="Open ${escapeHtml(label)}">
            <img src="${safeUrl}" alt="${escapeHtml(label)}" loading="lazy" crossorigin="anonymous">
          </a>
          <div class="image-meta" data-image-meta>Loading dimensions...</div>
          <div class="image-actions has-open">
            <button class="download-btn" type="button" data-download-url="${safeUrl}" data-download-name="${fileName}">Download PNG</button>
            <a class="open-link" href="${safeUrl}" target="_blank" rel="noopener">Open</a>
          </div>
        </div>
      `;
    }

    function designMatches(design, query) {
      if (!query) return true;
      const settings = design.settings || {};
      const haystack = [
        design.designId,
        design.orderName,
        design.orderNumber,
        design.orderId,
        design.customerEmail,
        design.customerName,
        settings.sourceFileName,
        settings.selectedSize,
        normalizeSize(settings.selectedSize),
        settings.inkColor,
        settings.aboveText,
        settings.belowText,
        settings.notesForDesigner
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function render() {
      const query = document.getElementById("search").value.trim().toLowerCase();
      const metrics = getMetrics();
      renderMetrics(metrics);
      renderCategoryTabs(metrics);

      const filtered = designs
        .filter(categoryMatches)
        .filter((design) => designMatches(design, query))
        .sort(sortDesignsForDashboard);
      const content = document.getElementById("content");
      document.getElementById("summary").innerHTML = `
        <span><strong>${filtered.length}</strong> shown of <strong>${designs.length}</strong> saved design${designs.length === 1 ? "" : "s"}</span>
        <span class="summary-note">Ordered designs appear first. Use PNG buttons for production downloads.</span>
      `;

      if (!filtered.length) {
        content.className = "status";
        content.textContent = designs.length ? "No designs match the current search." : "No saved designs found.";
        return;
      }

      content.className = "grid";
      content.innerHTML = filtered.map((design) => {
        const settings = design.settings || {};
        const finalStatus = design.finalDesignUrl ? "Final saved" : "Variant only";
        const orderLabel = design.orderName || (design.orderNumber ? `#${design.orderNumber}` : "-");
        const orderTitle = orderLabel === "-" ? "Awaiting Shopify order" : `Order ${orderLabel}`;
        const orderBadge = orderLabel === "-" ? "No order yet" : "Ordered";
        const badgeClass = orderLabel === "-" ? "warning" : "success";
        const customerLabel = design.customerName || design.customerEmail || "-";
        const orderCreatedLabel = design.orderCreatedAt ? formatDate(design.orderCreatedAt) : "-";
        const notes = settings.notesForDesigner || "";
        return `
          <article class="card">
            <div class="card-head">
              <div class="title-row">
                <div class="order-heading">
                  <div class="order-title">${escapeHtml(orderTitle)}</div>
                  <div class="design-id">${escapeHtml(design.designId || "No design id")}</div>
                </div>
                <div class="badge ${badgeClass}">${escapeHtml(orderBadge)}</div>
              </div>
              <div class="meta">
                <span class="meta-pill">${escapeHtml(finalStatus)}</span>
                <span class="meta-pill">Saved ${escapeHtml(formatDate(design.createdAt))}</span>
                <span class="meta-pill">Customer ${escapeHtml(customerLabel)}</span>
              </div>
            </div>
            <div class="images">
              ${imageCell("Final production design", design.finalDesignUrl, design.designId, "primary")}
              ${imageCell("Original upload", design.originalImageUrl, design.designId, "compact")}
            </div>
            <div class="settings">
              <div class="setting"><strong>Order</strong>${escapeHtml(orderLabel)}</div>
              <div class="setting"><strong>Order Date</strong>${escapeHtml(orderCreatedLabel)}</div>
              <div class="setting"><strong>Customer</strong>${escapeHtml(customerLabel)}</div>
              <div class="setting"><strong>Above Text</strong>${escapeHtml(settings.aboveText || "-")}</div>
              <div class="setting"><strong>Below Text</strong>${escapeHtml(settings.belowText || "-")}</div>
              ${notes ? `<div class="setting wide"><strong>Designer Notes</strong>${escapeHtml(notes)}</div>` : ""}
            </div>
          </article>
        `;
      }).join("");

      hydrateImageMetadata();
      hydrateDownloadButtons();
    }

    function hydrateImageMetadata() {
      document.querySelectorAll(".image-cell img").forEach((img) => {
        const meta = img.closest(".image-cell").querySelector("[data-image-meta]");
        const update = () => {
          meta.textContent = img.naturalWidth && img.naturalHeight
            ? `${img.naturalWidth} x ${img.naturalHeight}px`
            : "Dimensions unavailable";
        };
        if (img.complete) {
          update();
        } else {
          img.addEventListener("load", update, { once: true });
          img.addEventListener("error", () => {
            meta.textContent = "Could not load image";
          }, { once: true });
        }
      });
    }

    function downloadBlob(blob, filename) {
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = objectUrl;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
    }

    function loadImageForPng(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    async function downloadImageAsPng(url, filename) {
      const img = await loadImageForPng(url);
      const canvas = document.createElement("canvas");
      canvas.width = img.naturalWidth || img.width;
      canvas.height = img.naturalHeight || img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      if (!blob) throw new Error("PNG export failed.");
      downloadBlob(blob, filename);
    }

    function fallbackDownload(url, filename) {
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.target = "_blank";
      link.rel = "noopener";
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function hydrateDownloadButtons() {
      document.querySelectorAll("[data-download-url]").forEach((button) => {
        button.addEventListener("click", async () => {
          const url = button.dataset.downloadUrl;
          const filename = button.dataset.downloadName || "line-art-design.png";
          const originalText = button.textContent;
          button.disabled = true;
          button.textContent = "Preparing...";

          try {
            await downloadImageAsPng(url, filename);
          } catch (error) {
            fallbackDownload(url, filename);
          } finally {
            button.disabled = false;
            button.textContent = originalText;
          }
        });
      });
    }

    async function loadDesigns() {
      const limit = document.getElementById("limit").value;
      const content = document.getElementById("content");
      content.className = "status";
      content.textContent = "Loading...";
      document.getElementById("summary").textContent = "Loading designs...";

      try {
        const response = await fetch(`/api/designs?limit=${encodeURIComponent(limit)}`);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || "Could not load designs.");
        }
        designs = Array.isArray(data.designs) ? data.designs : [];
        render();
      } catch (error) {
        designs = [];
        document.getElementById("summary").textContent = "Dashboard error";
        content.className = "status";
        content.textContent = error.message;
      }
    }

    document.getElementById("refresh").addEventListener("click", loadDesigns);
    document.getElementById("limit").addEventListener("change", loadDesigns);
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("category-tabs").addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      activeCategory = button.dataset.category || "ordered";
      render();
    });
    loadDesigns();
  </script>
</body>
</html>
