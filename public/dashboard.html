<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Line Art Design Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f6f7;
      --surface: #ffffff;
      --surface-muted: #f9fafb;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --muted-light: #9ca3af;
      --accent: #111827;
      --accent-hover: #1f2937;
      --accent-soft: #f3f4f6;
      --accent-border: #d1d5db;
      --accent-text: #374151;
      --success-bg: #ecfdf3;
      --success-text: #166534;
      --success-border: #bbf7d0;
      --warning-bg: #fffbeb;
      --warning-text: #92400e;
      --warning-border: #fde68a;
      --neutral-bg: #f3f4f6;
      --neutral-text: #374151;
      --neutral-border: #e5e7eb;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .topbar-inner {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 240px;
    }

    .brand-mark {
      width: 86px;
      height: 58px;
      flex: 0 0 auto;
      border-radius: 6px;
      object-fit: contain;
      filter: drop-shadow(0 1px 1px rgba(17, 24, 39, 0.12));
    }

    .heading-block {
      display: grid;
      gap: 2px;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    input, select, button, .download-btn, .open-link {
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    }

    input {
      width: min(320px, 70vw);
      padding: 0 12px;
    }

    select { padding: 0 10px; }

    button, .download-btn, .open-link {
      padding: 0 14px;
      cursor: pointer;
      font-weight: 650;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      line-height: 1;
    }

    button.primary, .download-btn {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    button.primary:hover, .download-btn:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .open-link, button.secondary {
      background: #ffffff;
      color: var(--text);
    }

    .open-link:hover, button.secondary:hover {
      background: var(--surface-muted);
      border-color: var(--border-strong);
    }

    button:disabled {
      cursor: not-allowed;
      background: #f3f4f6;
      border-color: var(--border);
      color: var(--muted-light);
    }

    main {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 20px;
    }

    .summary {
      min-height: 44px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .summary strong {
      color: var(--text);
      font-weight: 700;
    }

    .summary-note {
      font-size: 12px;
      color: var(--muted-light);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-card {
      min-width: 0;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.04);
      display: grid;
      gap: 10px;
    }

    .metric-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .metric-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--neutral-text);
      box-shadow: 0 0 0 4px var(--neutral-bg);
    }

    .metric-card.success .metric-dot { background: var(--success-text); box-shadow: 0 0 0 4px var(--success-bg); }
    .metric-card.warning .metric-dot { background: var(--warning-text); box-shadow: 0 0 0 4px var(--warning-bg); }
    .metric-card.info .metric-dot { background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }

    .metric-value {
      color: var(--text);
      font-size: 26px;
      line-height: 1;
      font-weight: 760;
    }

    .category-tabs {
      padding: 4px;
      display: flex;
      gap: 4px;
      align-items: center;
      overflow-x: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .category-tab {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .category-tab:hover {
      background: var(--surface-muted);
      border-color: transparent;
    }

    .category-tab.active {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(360px, 42%) minmax(0, 1fr);
      grid-template-rows: auto 1fr;
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.04);
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.07);
    }

    .card-head {
      padding: 14px;
      display: grid;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      grid-column: 2;
      grid-row: 1;
    }

    .title-row {
      display: flex;
      gap: 10px;
      align-items: start;
      justify-content: space-between;
    }

    .order-heading {
      min-width: 0;
    }

    .design-id {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .order-title {
      margin-bottom: 4px;
      color: var(--text);
      font-size: 17px;
      font-weight: 760;
    }

    .badge {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--neutral-bg);
      border: 1px solid var(--neutral-border);
      color: var(--neutral-text);
      font-size: 12px;
      font-weight: 750;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge.success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .badge.warning {
      background: var(--warning-bg);
      border-color: var(--warning-border);
      color: var(--warning-text);
    }

    .badge.info {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent-text);
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .meta-pill {
      min-height: 24px;
      padding: 4px 8px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--muted);
      font-weight: 650;
    }

    .meta-pill.info {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent-text);
    }

    .meta-pill.success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    .meta-pill.warning {
      background: var(--warning-bg);
      border-color: var(--warning-border);
      color: var(--warning-text);
    }

    .images {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      background: var(--surface-muted);
      border-right: 1px solid var(--border);
      grid-column: 1;
      grid-row: 1 / span 2;
      align-content: start;
    }

    .image-cell {
      min-width: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .image-cell:hover {
      border-color: var(--border-strong);
      box-shadow: 0 1px 6px rgba(17, 24, 39, 0.05);
    }

    .image-label {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 750;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      background: var(--surface-muted);
    }

    .image-wrap {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .image-cell.primary .image-wrap,
    .image-cell.compact .image-wrap {
      aspect-ratio: 1.08;
      background: #f9fafb;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .image-empty {
      padding: 12px;
      color: var(--muted-light);
      font-size: 12px;
      text-align: center;
    }

    .image-meta {
      min-height: 34px;
      padding: 9px 12px 0;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .image-actions {
      padding: 10px 12px 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .image-actions.has-open {
      grid-template-columns: 1fr 1fr;
    }

    .download-btn, .open-link {
      width: 100%;
      min-width: 0;
      padding: 0 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .settings {
      padding: 14px;
      display: grid;
      gap: 12px;
      grid-column: 2;
      grid-row: 2;
      align-content: start;
    }

    .detail-section {
      min-width: 0;
      padding: 12px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .detail-section.design-content {
      padding: 14px;
      background: #ffffff;
      border-color: var(--accent-border);
      box-shadow: inset 4px 0 0 var(--accent), 0 1px 2px rgba(17, 24, 39, 0.04);
    }

    .detail-section-title {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .setting {
      min-width: 0;
      padding: 9px 10px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .design-content .setting {
      padding: 12px;
      border-color: var(--accent-border);
      font-size: 14px;
      line-height: 1.45;
    }

    .design-content .setting strong {
      color: var(--accent-text);
    }

    .setting.wide {
      grid-column: 1 / -1;
    }

    .setting strong {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .status {
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      text-align: center;
    }

    .empty-state {
      max-width: 440px;
      margin: 0 auto;
      display: grid;
      gap: 8px;
    }

    .empty-title {
      color: var(--text);
      font-size: 16px;
      font-weight: 760;
    }

    .empty-copy {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .skeleton-list {
      display: grid;
      gap: 16px;
    }

    .skeleton-card {
      min-height: 238px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(300px, 42%) minmax(0, 1fr);
    }

    .skeleton-pane {
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .skeleton-pane:first-child {
      border-right: 1px solid var(--border);
      background: var(--surface-muted);
    }

    .skeleton-line {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #edf0f3 0%, #f7f8f9 50%, #edf0f3 100%);
      background-size: 200% 100%;
      animation: skeletonPulse 1.2s ease-in-out infinite;
    }

    .skeleton-line.wide { width: 78%; }
    .skeleton-line.medium { width: 54%; }
    .skeleton-line.short { width: 34%; }
    .skeleton-image { height: 150px; border-radius: var(--radius); }

    .is-loading .refresh-label {
      opacity: 0.72;
    }

    @keyframes skeletonPulse {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    @media (max-width: 760px) {
      main { padding: 14px; gap: 14px; }
      .topbar-inner { padding: 10px 14px; gap: 12px; }
      .brand { min-width: 0; width: 100%; }
      .brand-mark { width: 72px; height: 49px; }
      .heading-block { min-width: 0; }
      h1 { font-size: 15px; }
      .eyebrow { font-size: 12px; }
      .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .metric-card { padding: 12px; gap: 8px; }
      .metric-value { font-size: 22px; }
      .card { grid-template-columns: 1fr; grid-template-rows: auto; }
      .card-head, .images, .settings { grid-column: 1; grid-row: auto; }
      .images { border-right: 0; border-bottom: 1px solid var(--border); }
      .images { grid-template-columns: repeat(2, minmax(0, 1fr)); padding: 12px; gap: 10px; }
      .image-label { padding: 8px 9px; font-size: 11px; }
      .image-meta { min-height: 0; padding: 7px 9px 0; font-size: 11px; }
      .image-actions { padding: 8px 9px 10px; gap: 6px; }
      .download-btn, .open-link { min-height: 36px; font-size: 11px; padding: 0 8px; }
      .detail-grid { grid-template-columns: 1fr; }
      input { width: 100%; }
      .toolbar { width: 100%; }
      .toolbar input { flex: 1 1 100%; }
      .toolbar select { flex: 1 1 calc(50% - 4px); }
      .toolbar button { flex: 1 1 calc(50% - 4px); }
      .grid { grid-template-columns: 1fr; }
      .image-actions.has-open { grid-template-columns: 1fr; }
      .topbar-inner { align-items: stretch; }
      .skeleton-card { grid-template-columns: 1fr; }
      .skeleton-pane:first-child { border-right: 0; border-bottom: 1px solid var(--border); }
    }

    @media (min-width: 761px) and (max-width: 1180px) {
      .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .card { grid-template-columns: minmax(300px, 44%) minmax(0, 1fr); }
      .images { grid-template-columns: 1fr; }
      .settings { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 480px) {
      main { padding: 10px; gap: 12px; }
      .topbar-inner { padding: 10px; }
      .brand { gap: 9px; }
      .brand-mark { width: 58px; height: 39px; }
      h1 { font-size: 14px; }
      .eyebrow { font-size: 11px; }
      .metrics-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .metric-card { padding: 10px; }
      .metric-label { font-size: 10px; }
      .metric-value { font-size: 20px; }
      .category-tabs { border-radius: 0; margin-inline: -10px; border-left: 0; border-right: 0; }
      .category-tab { min-height: 32px; padding: 0 10px; font-size: 12px; }
      .summary { align-items: flex-start; padding: 10px; font-size: 13px; }
      .summary-note { font-size: 11px; }
      .title-row { align-items: stretch; flex-direction: column; }
      .badge { width: max-content; }
      .card { border-radius: 0; margin-inline: -10px; border-left: 0; border-right: 0; }
      .settings, .card-head { padding: 10px; }
      .images { padding: 10px; gap: 8px; }
      .image-cell.primary .image-wrap,
      .image-cell.compact .image-wrap { aspect-ratio: 1; }
      .order-title { font-size: 15px; }
      .meta { gap: 6px; }
      .meta-pill { min-height: 22px; padding: 3px 7px; font-size: 11px; }
      .detail-section { padding: 10px; }
      .detail-section.design-content { padding: 10px; }
      .setting { padding: 8px; font-size: 12px; }
      .design-content .setting { padding: 9px; font-size: 13px; }
    }

    @media (max-width: 360px) {
      .images { grid-template-columns: 1fr; }
      .metrics-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img class="brand-mark" src="/stamp.webp" alt="" aria-hidden="true">
        <div class="heading-block">
          <h1>StampMyMark Studio</h1>
          <div class="eyebrow">Line art order dashboard</div>
        </div>
      </div>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search design id, text, size">
        <button id="refresh" class="primary" type="button"><span class="refresh-label">Refresh</span></button>
      </div>
    </div>
  </header>

  <main>
    <div class="metrics-grid" id="metrics"></div>
    <div class="category-tabs" id="category-tabs" aria-label="Design categories"></div>
    <div class="summary" id="summary">Loading designs...</div>
    <div id="content" class="status">Loading...</div>
    <div id="load-more" class="status" hidden></div>
  </main>

  <script>
    const sizeLabels = {
      m: "M - 4 in",
      l: "L - 6 in",
      xl: "XL - 8 in",
      xxl: "XXL - 10 in"
    };

    let designs = [];
    let totalMetrics = null;
    let activeCategory = "ordered";
    let nextCursor = null;
    let isLoading = false;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatDate(value) {
      if (!value) return "Unknown date";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Unknown date";
      return date.toLocaleString();
    }

    function normalizeSize(size) {
      const key = String(size || "").toLowerCase();
      return sizeLabels[key] || String(size || "Not saved").toUpperCase();
    }

    function hasOrder(design) {
      return Boolean(design.orderName || design.orderNumber || design.orderId);
    }

    function hasFinalDesign(design) {
      return Boolean(design.finalDesignUrl);
    }

    function getMetrics() {
      return {
        total: designs.length,
        ordered: designs.filter(hasOrder).length,
        awaiting: designs.filter((design) => !hasOrder(design)).length,
        finalReady: designs.filter(hasFinalDesign).length
      };
    }

    function categoryMatches(design) {
      if (activeCategory === "ordered") return hasOrder(design);
      if (activeCategory === "awaiting") return !hasOrder(design);
      if (activeCategory === "final") return hasFinalDesign(design);
      return true;
    }

    function sortDesignsForDashboard(a, b) {
      const orderDelta = Number(hasOrder(b)) - Number(hasOrder(a));
      if (orderDelta) return orderDelta;

      const aTime = new Date(a.createdAt || 0).getTime() || 0;
      const bTime = new Date(b.createdAt || 0).getTime() || 0;
      return bTime - aTime;
    }

    function renderMetrics(metrics) {
      document.getElementById("metrics").innerHTML = `
        <div class="metric-card success">
          <div class="metric-top"><div class="metric-label">Ordered</div><span class="metric-dot"></span></div>
          <div class="metric-value">${metrics.ordered}</div>
        </div>
        <div class="metric-card warning">
          <div class="metric-top"><div class="metric-label">Awaiting order</div><span class="metric-dot"></span></div>
          <div class="metric-value">${metrics.awaiting}</div>
        </div>
        <div class="metric-card info">
          <div class="metric-top"><div class="metric-label">Final ready</div><span class="metric-dot"></span></div>
          <div class="metric-value">${metrics.finalReady}</div>
        </div>
        <div class="metric-card">
          <div class="metric-top"><div class="metric-label">Total saved</div><span class="metric-dot"></span></div>
          <div class="metric-value">${metrics.total}</div>
        </div>
      `;
    }

    function renderCategoryTabs(metrics) {
      const tabs = [
        ["ordered", `Ordered (${metrics.ordered})`],
        ["awaiting", `Awaiting order (${metrics.awaiting})`],
        ["final", `Final ready (${metrics.finalReady})`],
        ["all", `All (${metrics.total})`]
      ];

      document.getElementById("category-tabs").innerHTML = tabs.map(([key, label]) => `
        <button class="category-tab${activeCategory === key ? " active" : ""}" type="button" data-category="${key}">
          ${escapeHtml(label)}
        </button>
      `).join("");
    }

    function filenameFrom(label, designId) {
      const safeId = String(designId || "line-art-design")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "line-art-design";
      const safeLabel = String(label || "image")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "image";
      return `${safeId}-${safeLabel}.png`;
    }

    function imageCell(label, url, designId, modifier = "") {
      const cellClass = `image-cell${modifier ? ` ${modifier}` : ""}`;
      if (!url) {
        return `
          <div class="${cellClass}">
            <div class="image-label">${label}</div>
            <div class="image-actions">
              <button class="secondary" type="button" disabled>Unavailable</button>
            </div>
          </div>
        `;
      }

      const safeUrl = escapeHtml(url);
      const fileName = escapeHtml(filenameFrom(label, designId));
      return `
        <div class="${cellClass}">
          <div class="image-label">${label}</div>
          <div class="image-actions has-open">
            <button class="download-btn" type="button" data-download-url="${safeUrl}" data-download-name="${fileName}">Download PNG</button>
            <a class="open-link" href="${safeUrl}" target="_blank" rel="noopener">Open image</a>
          </div>
        </div>
      `;
    }

    function emptyState(title, copy) {
      return `
        <div class="empty-state">
          <div class="empty-title">${escapeHtml(title)}</div>
          <div class="empty-copy">${escapeHtml(copy)}</div>
        </div>
      `;
    }

    function renderLoadingSkeleton() {
      return `
        <div class="skeleton-list" aria-label="Loading designs">
          ${[1, 2].map(() => `
            <div class="skeleton-card">
              <div class="skeleton-pane">
                <div class="skeleton-line skeleton-image"></div>
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line short"></div>
              </div>
              <div class="skeleton-pane">
                <div class="skeleton-line wide"></div>
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line wide"></div>
                <div class="skeleton-line short"></div>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function designMatches(design, query) {
      if (!query) return true;
      const settings = design.settings || {};
      const haystack = [
        design.designId,
        design.orderName,
        design.orderNumber,
        design.orderId,
        design.customerEmail,
        design.customerName,
        settings.sourceFileName,
        settings.selectedSize,
        normalizeSize(settings.selectedSize),
        settings.inkColor,
        settings.aboveText,
        settings.belowText,
        settings.notesForDesigner
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function render() {
      const query = document.getElementById("search").value.trim().toLowerCase();
      const metrics = totalMetrics || getMetrics();
      renderMetrics(metrics);
      renderCategoryTabs(metrics);

      const filtered = designs
        .filter(categoryMatches)
        .filter((design) => designMatches(design, query))
        .sort(sortDesignsForDashboard);
      const content = document.getElementById("content");
      document.getElementById("summary").innerHTML = `
        <span><strong>${filtered.length}</strong> shown of <strong>${designs.length}</strong> saved design${designs.length === 1 ? "" : "s"}</span>
        <span class="summary-note">Ordered first. Download PNG for production handoff.</span>
      `;

      if (!filtered.length) {
        content.className = "status";
        content.innerHTML = designs.length
          ? emptyState("No matching designs", "Try another search term or switch tabs to see more saved artwork.")
          : emptyState("No saved designs yet", "Generated customer designs will appear here once the storefront saves them.");
        return;
      }

      content.className = "grid";
      content.innerHTML = filtered.map((design) => {
        const settings = design.settings || {};
        const finalStatus = design.finalDesignUrl ? "Final saved" : "Variant only";
        const finalBadgeClass = design.finalDesignUrl ? "info" : "warning";
        const orderLabel = design.orderName || (design.orderNumber ? `#${design.orderNumber}` : "-");
        const orderTitle = orderLabel === "-" ? "Awaiting Shopify order" : `Order ${orderLabel}`;
        const orderBadge = orderLabel === "-" ? "No order yet" : "Ordered";
        const badgeClass = orderLabel === "-" ? "warning" : "success";
        const customerLabel = design.customerName || design.customerEmail || "-";
        const orderCreatedLabel = design.orderCreatedAt ? formatDate(design.orderCreatedAt) : "-";
        const notes = settings.notesForDesigner || "";
        return `
          <article class="card">
            <div class="card-head">
              <div class="title-row">
                <div class="order-heading">
                  <div class="order-title">${escapeHtml(orderTitle)}</div>
                  <div class="design-id">${escapeHtml(design.designId || "No design id")}</div>
                </div>
                <div class="badge ${badgeClass}">${escapeHtml(orderBadge)}</div>
              </div>
              <div class="meta">
                <span class="meta-pill ${finalBadgeClass}">${escapeHtml(finalStatus)}</span>
                <span class="meta-pill">Saved ${escapeHtml(formatDate(design.createdAt))}</span>
                <span class="meta-pill ${badgeClass}">${escapeHtml(orderBadge)}</span>
              </div>
            </div>
            <div class="images">
              ${imageCell("Final production design", design.finalDesignUrl, design.designId, "primary")}
              ${imageCell("Original upload", design.originalImageUrl, design.designId, "compact")}
            </div>
            <div class="settings">
              <section class="detail-section design-content">
                <div class="detail-section-title">Design content</div>
                <div class="detail-grid">
                  <div class="setting"><strong>Above Text</strong>${escapeHtml(settings.aboveText || "-")}</div>
                  <div class="setting"><strong>Below Text</strong>${escapeHtml(settings.belowText || "-")}</div>
                  ${notes ? `<div class="setting wide"><strong>Designer Notes</strong>${escapeHtml(notes)}</div>` : ""}
                </div>
              </section>
              <section class="detail-section">
                <div class="detail-section-title">Order details</div>
                <div class="detail-grid">
                  <div class="setting"><strong>Order</strong>${escapeHtml(orderLabel)}</div>
                  <div class="setting"><strong>Order Date</strong>${escapeHtml(orderCreatedLabel)}</div>
                  <div class="setting wide"><strong>Customer</strong>${escapeHtml(customerLabel)}</div>
                </div>
              </section>
            </div>
          </article>
        `;
      }).join("");

      hydrateDownloadButtons();
    }

    function downloadBlob(blob, filename) {
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = objectUrl;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(objectUrl), 1000);
    }

    function loadImageForPng(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    async function downloadImageAsPng(url, filename) {
      const img = await loadImageForPng(url);
      const canvas = document.createElement("canvas");
      canvas.width = img.naturalWidth || img.width;
      canvas.height = img.naturalHeight || img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      if (!blob) throw new Error("PNG export failed.");
      downloadBlob(blob, filename);
    }

    function fallbackDownload(url, filename) {
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.target = "_blank";
      link.rel = "noopener";
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function hydrateDownloadButtons() {
      document.querySelectorAll("[data-download-url]").forEach((button) => {
        button.addEventListener("click", async () => {
          const url = button.dataset.downloadUrl;
          const filename = button.dataset.downloadName || "line-art-design.png";
          const originalText = button.textContent;
          button.disabled = true;
          button.textContent = "Preparing...";

          try {
            await downloadImageAsPng(url, filename);
          } catch (error) {
            fallbackDownload(url, filename);
          } finally {
            button.disabled = false;
            button.textContent = originalText;
          }
        });
      });
    }

    async function loadDesigns({ reset = false } = {}) {
      if (isLoading || (!reset && !nextCursor && designs.length)) return;

      const content = document.getElementById("content");
      const refreshButton = document.getElementById("refresh");
      const loadMore = document.getElementById("load-more");
      isLoading = true;
      refreshButton.disabled = true;
      refreshButton.classList.add("is-loading");
      refreshButton.querySelector(".refresh-label").textContent = reset ? "Refreshing" : "Loading";
      loadMore.hidden = false;
      loadMore.textContent = "Loading more designs...";

      if (reset || !designs.length) {
        designs = [];
        nextCursor = null;
        content.className = "grid";
        content.innerHTML = renderLoadingSkeleton();
        document.getElementById("summary").textContent = "Loading designs...";
      }

      try {
        const params = new URLSearchParams({ limit: "25" });
        if (!reset && nextCursor) params.set("cursor", nextCursor);
        const response = await fetch(`/api/designs?${params}`);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Could not load designs.");

        const page = Array.isArray(data.designs) ? data.designs : [];
        designs = reset ? page : [...designs, ...page];
        nextCursor = data.nextCursor || null;
        if (data.metrics) totalMetrics = data.metrics;
        console.info("[dashboard] designs page loaded", {
          pageCount: page.length,
          loadedCount: designs.length,
          hasMore: Boolean(nextCursor),
          timings: data.timings || null
        });
        render();
        loadMore.hidden = !nextCursor;
        loadMore.textContent = nextCursor ? "Scroll to load more designs" : "";
      } catch (error) {
        if (!designs.length) {
          document.getElementById("summary").textContent = "Dashboard error";
          content.className = "status";
          content.innerHTML = emptyState("Could not load designs", error.message);
          loadMore.hidden = true;
        } else {
          loadMore.hidden = false;
          loadMore.textContent = `Could not load more designs: ${error.message}`;
        }
      } finally {
        isLoading = false;
        refreshButton.disabled = false;
        refreshButton.classList.remove("is-loading");
        refreshButton.querySelector(".refresh-label").textContent = "Refresh";
      }
    }

    const loadMoreObserver = new IntersectionObserver((entries) => {
      if (entries.some((entry) => entry.isIntersecting) && nextCursor && !isLoading) {
        loadDesigns();
      }
    }, { rootMargin: "500px 0px" });

    loadMoreObserver.observe(document.getElementById("load-more"));

    document.getElementById("refresh").addEventListener("click", () => loadDesigns({ reset: true }));
    document.getElementById("search").addEventListener("input", render);
    document.getElementById("category-tabs").addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      activeCategory = button.dataset.category || "ordered";
      render();
    });
    loadDesigns({ reset: true });
  </script>
</body>
</html>
