<header class="topbar"><div class="topbar-inner"><div class="brand"><span class="brand-mark"><img src="/stamp.webp" alt="StampMyMark"></span><div class="brand-copy"><div class="brand-title-line"><h1>StampMyMark Studio</h1><span class="console-pill">Production</span></div><div class="eyebrow"><span class="header-live-dot"></span>Order operations console</div></div></div><div class="topbar-actions"><div class="live-chip"><span class="header-live-dot"></span><span>Live</span></div><button id="logout" class="nav-button" title="Log out"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 5H5v14h5M14 8l4 4-4 4M18 12H9"></path></svg><span>Logout</span></button><button id="refresh" class="refresh-button" title="Refresh queue"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7"></path><path d="M20 4v7h-7"></path></svg><span>Refresh</span></button></div></div></header>

="xxl">XXL - 10 in</option></select></label><label class="filter-field"><span class="filter-label">Artwork</span><select id="final" class="control"><option value="">Any artwork</option><option value="yes">Artwork available</option><option value="no">Artwork missing</option></select></label><label class="filter-field"><span class="filter-label">Saved</span><select id="days" class="control"><option value="">Any date</option><option value="1">Last 24 hours</option><option value="7">Last 7 days</option><option value="30">Last 30 days</option><option value="90">Last 90 days</option></select></label></section><div id="live-banner" class="live-banner" hidden><span id="live-text">New updates are available</span><button id="show-updates" class="small">Show updates</button></div><div class="summary"><span id="summary">Loading queue...</span><span>Ordered designs first, followed by attention items.</span></div><section class="queue"><div class="queue-head"><div>Order</div><div>Status</div><div>Customer</div><div>Size</div><div>Design content</div><div>Location</div><div>Saved</div><div>Actions</div></div><div id="rows"></div><div id="more" class="load-more" hidden></div></section></main>

<script>
const sizes={s:"S - 3 in",m:"M - 4 in",l:"L - 6 in",xl:"XL - 8 in",xxl:"XXL - 10 in"},labels={abandoned:"Abandoned",needs_attention:"Needs attention",ordered:"Ordered"};
let designs=[],cursor=null,loading=false,metrics=null,total=null,selected=null,timer,pendingUpdates=0;
const $=id=>document.getElementById(id),esc=v=>String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const ordered=d=>Boolean(d.hasOrder||d.orderName||d.orderNumber||d.orderId);
function state(d){if(!ordered(d))return"abandoned";return d.finalDesignUrl?"ordered":"needs_attention"}
function relative(v){if(!v)return"Unknown";const d=new Date(v),s=(Date.now()-d)/1000;if(s<60)return"Just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";if(s<172800)return"Yesterday";if(s<604800)return Math.floor(s/86400)+"d ago";return d.toLocaleDateString()}

function visitorInfo(d){return d.visitor||d.lastVisitor||{}}
function visitorLocation(d){const v=visitorInfo(d);return v.location||[v.city,v.region,v.country].filter(Boolean).join(", ")||"-"}
function params(){const p=new URLSearchParams(),map={q:$("search").value.trim(),status:$("status").value,size:$("size").value,final:$("final").value,days:$("days").value};for(const[k,v]of Object.entries(map))if(v&&!(k==="status"&&v==="all"))p.set(k,v);return p}
function notify(m){$("toast").textContent=m;$("toast").classList.add("show");clearTimeout($("toast").t);$("toast").t=setTimeout(()=>$("toast").classList.remove("show"),2200)}
function renderMetrics(){const m=metrics||{ordered:0,abandoned:0,needsAttention:0};$("metrics").innerHTML=[["Ordered",m.ordered,"ordered"],["Abandoned",m.abandoned,"abandoned"],["Needs attention",m.needsAttention,"needs_attention"]].map(x=>`<button class="metric" data-status="${x[2]}"><span class="metric-label">${x[0]}</span><span class="metric-value">${x[1]}</span></button>`).join("")}
function isNew(d){const date=new Date(d.orderCreatedAt||0);return ordered(d)&&!isNaN(date)&&Date.now()-date<86400000}
function row(d){const s=d.settings||{},v=visitorInfo(d),st=state(d),order=d.orderName||(d.orderNumber?`#${d.orderNumber}`:"Abandoned design"),customer=d.customerName||d.customerEmail||"No customer",copy=[s.aboveText,s.belowText].filter(Boolean).join(" / ")||"No text saved",location=visitorLocation(d),ip=v.ip||"",newTag=isNew(d)?'<span class="new-tag">New</span>':"",attentionHelp=st==="needs_attention"?'<div class="attention-help"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8v5m0 3h.01M10.3 4.5 2.7 18a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 4.5a2 2 0 0 0-3.4 0Z"></path></svg><span><strong>Artwork was not saved.</strong> Check this order in Shopify for the customer image.</span></div>':"",primary=d.finalDesignUrl?`<button class="primary small" data-download="${esc(d.designId)}"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"></path></svg>Download</button>`:"";return `<article class="queue-row ${st==="needs_attention"?"attention":""}" tabindex="0" data-id="${esc(d.designId)}"><div><div class="order-name">${esc(order)} ${newTag}</div><div class="design-id">${esc(d.designId)}</div><div class="subtle mobile-customer">${esc(customer)}</div></div><div><span class="badge ${st}">${labels[st]}</span></div><div><div class="customer">${esc(customer)}</div><div class="subtle">${esc(d.customerEmail||"")}</div></div><div>${esc(sizes[String(s.selectedSize||"").toLowerCase()]||String(s.selectedSize||"-").toUpperCase())}</div><div class="design-copy">${esc(copy)}${s.notesForDesigner?`<div class="note-wrap"><div class="note-text" title="${esc(s.notesForDesigner)}">${esc(s.notesForDesigner)}</div></div>`:""}${attentionHelp}</div><div><div>${esc(location)}</div><div class="subtle">${esc(ip)}</div></div><div title="${esc(exact(d.createdAt))}">${esc(relative(d.createdAt))}</div><div class="actions">${primary}<button class="small" data-view="${esc(d.designId)}"><svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>View</button></div></article>`}function render(){if(!designs.length){const active=params(),status=$("status").value,copy=status==="needs_attention"?["All caught up","No orders currently need artwork attention."]:status==="abandoned"?["No abandoned designs","Every saved design in this view became an order."]:active.toString()?["No matching designs","Try removing a filter or using a broader search."]:["Your queue is empty","New orders and saved designs will appear here automatically."];$("rows").innerHTML=`<div class="state"><div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M4 7h16v12H4zM8 7V5h8v2M8 12h8"></path></svg></div><div class="state-title">${copy[0]}</div><div>${copy[1]}</div>${active.toString()?'<button class="small secondary" data-empty-clear>Clear filters</button>':""}</div>`}else $("rows").innerHTML=designs.map(row).join("");summary()}
function summary(){$("summary").innerHTML=total==null?`<strong>${designs.length}</strong> designs loaded`:`Showing <strong>${designs.length}</strong> of <strong>${total}</strong> matching designs`}
async function loadMetrics(){try{const r=await fetch("/api/design-metrics?"+params()),d=await r.json();if(r.ok){metrics=d.metrics;renderMetrics()}}catch{}}
